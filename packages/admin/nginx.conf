# admin 容器 nginx —— 托管 SPA 静态文件 + 反代三个后端服务。
# 服务名是 docker-compose 里的容器名，靠 compose 内网 DNS 解析。
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # api-gateway (8767)：admin REST/WS、cli、status
    location /admin {
        proxy_pass http://api-gateway:8767;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }
    location /cli {
        proxy_pass http://api-gateway:8767;
        proxy_set_header Host $host;
    }
    location /status {
        proxy_pass http://api-gateway:8767;
        proxy_set_header Host $host;
    }

    # agent-gateway (8769)：去掉 /agent-gw 前缀；SSE 关闭缓冲
    location /agent-gw/ {
        proxy_pass http://agent-gateway:8769/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
    }

    # portal-api admin 接口:先经 api-gateway 校验管理后台会话(auth_request 子请求
    # 打到 /admin/me)。浏览器在控制台登录后带 boss_admin_token cookie(path=/);
    # 200=已登录放行,401=未登录拦截 —— 防止 /portal/admin/* 被未授权直达。
    location = /_portal_admin_auth {
        internal;
        proxy_pass http://api-gateway:8767/admin/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }
    location /portal/admin {
        auth_request /_portal_admin_auth;
        proxy_pass http://portal-api:8771/admin;
        proxy_set_header Host $host;
    }

    # portal-api (8771)：去掉 /portal 前缀
    location /portal/ {
        proxy_pass http://portal-api:8771/;
        proxy_set_header Host $host;
    }

    # SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
