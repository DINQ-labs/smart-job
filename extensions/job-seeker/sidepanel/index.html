<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>DingQ v3</title>
<meta name="referrer" content="no-referrer">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/reset.css">
<link rel="stylesheet" href="styles/components.css">
<link rel="stylesheet" href="styles/autofill.css">
</head>
<body>
<div id="app">
  <!-- ── 顶栏 Header ───────────────────────────────────────── -->
  <header class="header">
    <button class="header-home" id="headerHome" type="button" data-i18n-attr="title:header.homeTitle">
      <span class="header-bot" aria-hidden="true">🏠</span>
      <span class="header-title" data-i18n="header.home">首页</span>
    </button>
    <span class="header-spacer"></span>
    <button class="header-lang" id="headerLang" type="button" data-i18n-switch></button>
    <span class="header-mode" id="headerMode" role="button" tabindex="0"
          data-i18n-attr="title:header.modeTitle">
      <span class="header-mode-dot" id="headerModeDot" aria-hidden="true"></span>
      <span id="headerModeLabel">Boss · 求职</span>
      <span class="header-mode-switch" aria-hidden="true">⇆</span>
    </span>
  </header>

  <!-- ── 顶部 Tab 栏 ──────────────────────────────────────── -->
  <nav class="pt" id="ptTabs">
    <button class="pt-tab active" data-tab="chat" type="button">
      <span class="pt-tab-ico" aria-hidden="true">💬</span><span data-i18n="tabs.chat">AI助手</span>
    </button>
    <button class="pt-tab" data-tab="tasks" type="button">
      <span class="pt-tab-ico" aria-hidden="true">📋</span><span data-i18n="tabs.tasks">任务</span>
      <span class="pt-tab-badge hidden" id="tabTasksBadge">0</span>
    </button>
    <!-- 收藏 tab 暂时隐藏(保留按钮 / #tab-bookmarks 面板 / bookmarks.js,去掉 hidden 类即恢复)-->
    <button class="pt-tab hidden" data-tab="bookmarks" type="button">
      <span class="pt-tab-ico" aria-hidden="true">⭐</span><span data-i18n="tabs.bookmarks">收藏</span>
    </button>
    <button class="pt-tab" data-tab="tools" type="button">
      <span class="pt-tab-ico" aria-hidden="true">🛠️</span><span data-i18n="tabs.tools">工具</span>
    </button>
    <button class="pt-tab" data-tab="profile" type="button">
      <span class="pt-tab-ico" aria-hidden="true">👤</span><span data-i18n="tabs.profile">我的</span>
    </button>
  </nav>

  <!-- ── 上下文条 ContextBar ──────────────────────────────── -->
  <section class="ctx-bar" id="ctxBar">
    <div class="ctx-row" id="ctxResume" hidden>
      <span class="ctx-label">📄</span>
      <span class="ctx-value" id="ctxResumeText"></span>
    </div>
    <div class="ctx-row" id="ctxPrefs" hidden>
      <span class="ctx-label">🎯</span>
      <span class="ctx-value" id="ctxPrefsText"></span>
    </div>
    <div class="ctx-row" id="ctxPage" hidden>
      <span class="ctx-label" id="ctxPageIcon">📌</span>
      <span class="ctx-value" id="ctxPageText"></span>
    </div>
  </section>

  <!-- ── 应用主体(Tab 面板)───────────────────────────────── -->
  <main class="app-body">
    <!-- Tab: AI 对话 -->
    <section class="tab-pane active" id="tab-chat">
      <div class="chat" id="chatStream"></div>
      <div class="chat-hints" id="chatHints"></div>
      <div class="chat-input-box">
        <textarea id="chatInput" rows="1" placeholder="问我想做什么…" data-i18n-attr="placeholder:chat.placeholder"></textarea>
        <button class="send-btn" id="chatSendBtn" type="button" data-i18n="chat.send">发送</button>
      </div>
    </section>

    <!-- Tab: 任务 -->
    <section class="tab-pane" id="tab-tasks">
      <div id="tasksList"></div>
    </section>

    <!-- Tab: 收藏 -->
    <section class="tab-pane" id="tab-bookmarks">
      <div class="bm-filter-bar" id="bmFilterBar"></div>
      <div id="bookmarksList"></div>
    </section>

    <!-- Tab: 我的 -->
    <section class="tab-pane" id="tab-profile">
      <div id="profileContent"></div>
      <!-- 表单自动填写资料(合并自「工具」)-->
      <div id="view-profile" class="af-ui"></div>
    </section>

    <!-- Tab: 工具(二级菜单:表单填写 / 填写记录 / API录制)-->
    <section class="tab-pane" id="tab-tools">
      <nav class="subnav" id="toolsSubnav">
        <button class="subnav-btn active" data-sub="detect" type="button" data-i18n="tools.sub.detect">🔍 表单填写</button>
        <button class="subnav-btn" data-sub="log" type="button" data-i18n="tools.sub.log">📜 填写记录</button>
        <button class="subnav-btn" data-sub="recorder" type="button" data-i18n="tools.sub.recorder">📹 API录制</button>
      </nav>
      <div class="tools-pane af-ui">
        <section class="tools-view" id="view-detect"></section>
        <section class="tools-view hidden" id="view-log"></section>
        <section class="tools-view hidden" id="view-recorder"></section>
      </div>
    </section>

    <!-- 登录 Gate(整层覆盖)-->
    <div class="login-gate" id="loginGate">
      <div class="card">
        <div class="ico" aria-hidden="true">🔐</div>
        <div style="font-size:var(--text-lg);font-weight:var(--fw-medium)" data-i18n="login.title">未登录</div>
        <div style="font-size:var(--text-sm);color:var(--muted)" data-i18n="login.desc">
          在扩展内登录后即可使用 AI 助手与全部功能.
        </div>
        <button class="btn primary" id="gateOpenLogin" type="button" data-i18n="login.action">登录 / 注册</button>
        <button class="gate-forgot" id="gateForgotPwd" type="button" data-i18n="login.forgot">忘记密码?</button>
      </div>
    </div>
  </main>
</div>

<!-- autofill 子系统 toast -->
<div id="af-toast" class="hidden"></div>

<!-- ── 模块加载顺序 ─────────────────────────────────────── -->
<!-- i18n 引擎必须最先加载:t() / data-i18n 供后续所有模块与 HTML 使用 -->
<script src="/lib/i18n/i18n.js"></script>
<script src="/lib/i18n/dict/common.js"></script>
<script src="/lib/i18n/dict/sidepanel.js"></script>
<script src="/lib/i18n/dict/sp-profile.js"></script>
<script src="/lib/i18n/dict/sp-autofill.js"></script>
<script src="/lib/i18n/switcher.js"></script>
<!-- shared 必须先于 modules,modules 必须先于 app -->
<script src="shared/events.js"></script>
<script src="shared/api.js"></script>
<script src="shared/auth-api.js"></script>
<script src="modules/chips-loader.js"></script>
<script src="modules/chat.js"></script>
<script src="modules/tasks.js"></script>
<script src="modules/task-detail.js"></script>
<script src="modules/bookmarks.js"></script>
<script src="modules/profile.js"></script>
<script src="modules/welcome.js"></script>
<script src="modules/forgot-password.js"></script>
<script src="modules/onboarding.js"></script>
<script src="modules/jobseeker.js"></script>
<!-- 工具 tab:autofill 表单填写(af-* + autofill 模块)+ API 录制 -->
<script src="autofill/af-events.js"></script>
<script src="autofill/af-api.js"></script>
<script src="autofill/supplement.js"></script>
<script src="autofill/detect.js"></script>
<script src="autofill/profile.js"></script>
<script src="autofill/log.js"></script>
<script src="modules/recorder-view.js"></script>
<script src="modules/tools.js"></script>
<script src="app.js"></script>
</body>
</html>
