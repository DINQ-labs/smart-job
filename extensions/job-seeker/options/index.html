<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>DingQ v3 · 设置</title>
<link rel="stylesheet" href="../sidepanel/styles/tokens.css">
<link rel="stylesheet" href="../sidepanel/styles/reset.css">
<link rel="stylesheet" href="../sidepanel/styles/components.css">
<style>
  body { padding: var(--sp-6); max-width: 640px; margin: 0 auto; background: var(--bg); color: var(--ink); }
  h1 { font-size: var(--text-3xl); font-weight: var(--fw-bold); margin: 0 0 var(--sp-4); }
  h2 {
    font-size: var(--text-sm);
    font-weight: var(--fw-bold);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin: var(--sp-5) 0 var(--sp-2);
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--rd-lg);
    padding: var(--sp-4);
    display: flex;
    flex-direction: column;
    gap: var(--sp-3);
  }
  .preset {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: var(--sp-2);
  }
  .preset button {
    padding: var(--sp-2) var(--sp-2);
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--rd-md);
    font-size: var(--text-sm);
    font-weight: var(--fw-medium);
    color: var(--ink-2);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .preset button:hover { border-color: var(--slate-400); }
  .preset button.active {
    border-color: var(--slate-900);
    background: var(--slate-50);
    color: var(--ink);
  }
  .preset button .top {
    display: block;
    font-size: var(--text-xs);
    color: var(--muted);
    margin-bottom: 2px;
  }
  .preset button.active .top { color: var(--slate-600); }

  .field { display: flex; flex-direction: column; gap: var(--sp-1); }
  .field label {
    font-size: var(--text-xs);
    font-weight: var(--fw-bold);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  .field input {
    padding: var(--sp-2) var(--sp-2\.5);
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--rd-md);
    font-size: var(--text-sm);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--ink);
  }
  .field input:focus { outline: none; border-color: var(--slate-900); }
  .field input:disabled {
    background: var(--surface-alt);
    color: var(--muted);
    cursor: not-allowed;
  }

  .derived {
    background: var(--surface-alt);
    border-radius: var(--rd-md);
    padding: var(--sp-2) var(--sp-3);
    font-size: var(--text-xs);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .derived .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--sp-2);
    padding: 4px 0;
  }
  .derived .name { color: var(--muted); }
  .derived .url { color: var(--ink); word-break: break-all; text-align: right; }

  .row-buttons {
    display: flex;
    gap: var(--sp-2);
    align-items: center;
  }
  .btn-primary, .btn-secondary, .btn-danger {
    padding: var(--sp-2) var(--sp-3);
    border-radius: var(--rd-md);
    font-size: var(--text-sm);
    font-weight: var(--fw-medium);
    border: 0;
    cursor: pointer;
  }
  .btn-primary { background: var(--slate-900); color: var(--white); }
  .btn-primary:hover { background: var(--slate-800); }
  .btn-secondary {
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--border-soft);
  }
  .btn-secondary:hover { background: var(--surface-alt); }
  .btn-danger {
    background: var(--surface);
    color: var(--red-600);
    border: 1px solid var(--red-200);
  }
  .btn-danger:hover { background: var(--red-50); }

  .toast {
    display: inline-flex;
    align-items: center;
    gap: var(--sp-1);
    font-size: var(--text-xs);
    color: var(--green-600);
    padding: 4px 8px;
    background: var(--green-50);
    border: 1px solid var(--green-200);
    border-radius: var(--rd-md);
  }
  .toast.hidden { display: none; }

  .account {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--sp-3);
  }
  .account .info { display: flex; flex-direction: column; gap: 2px; }
  .account .email { font-size: var(--text-sm); font-weight: var(--fw-bold); color: var(--ink); }
  .account .uid {
    font-size: var(--text-tiny);
    color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .account .placeholder { font-size: var(--text-sm); color: var(--muted); }

  .health-row {
    display: flex; align-items: center; gap: var(--sp-2);
    font-size: var(--text-xs); color: var(--muted);
  }
  .health-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: var(--rd-full);
    background: var(--slate-300);
  }
  .health-dot.up   { background: var(--green-600); }
  .health-dot.down { background: var(--red-600); }
</style>
</head>
<body>
  <h1 data-i18n="options.h1" style="display:flex;align-items:center;justify-content:space-between;">DingQ v3 · 设置<button data-i18n-switch type="button" style="cursor:pointer;padding:2px 8px;border:1px solid #ccc;border-radius:10px;background:#fff;font-size:12px">中/EN</button></h1>

  <h2 data-i18n="options.section.backend">后端地址</h2>
  <div class="panel">
    <div class="preset" id="presetRow">
      <button type="button" data-preset="localhost">
        <span class="top" data-i18n="options.preset.dev">开发环境</span>
        <span data-i18n="options.preset.dev.addr">本地 127.0.0.1</span>
      </button>
      <button type="button" data-preset="prod">
        <span class="top" data-i18n="options.preset.prod">线上环境</span>
        <span>job.joyhouse.chat</span>
      </button>
      <button type="button" data-preset="custom">
        <span class="top" data-i18n="options.preset.custom">自定义</span>
        <span data-i18n="options.preset.custom.hint">逐项手填</span>
      </button>
    </div>

    <div class="field">
      <label for="portalApiUrl" data-i18n="options.label.portalApi">portal-api（账号 / 鉴权）</label>
      <input type="text" id="portalApiUrl" placeholder="https://api.job.joyhouse.chat">
    </div>
    <div class="field">
      <label for="apiGwUrl" data-i18n="options.label.apiGw">api-gw（命令网关 / WebSocket）</label>
      <input type="text" id="apiGwUrl" placeholder="https://control.job.joyhouse.chat">
    </div>
    <div class="field">
      <label for="agentGwUrl" data-i18n="options.label.agentGw">agent-gw（Agent 对话 / 录制上送）</label>
      <input type="text" id="agentGwUrl" placeholder="https://agent.job.joyhouse.chat">
    </div>

    <div class="row-buttons">
      <button class="btn-primary" id="saveBtn" type="button" data-i18n="options.btn.save">保存</button>
      <button class="btn-secondary" id="pingBtn" type="button" data-i18n="options.btn.ping">测试连接</button>
      <span class="toast hidden" id="savedTip" data-i18n="options.toast.saved">✓ 已保存</span>
    </div>

    <div id="healthRows" hidden style="display:flex;flex-direction:column;gap:var(--sp-1)"></div>
  </div>

  <h2 data-i18n="options.section.account">账号</h2>
  <div class="panel">
    <div class="account" id="accountRow">
      <div class="info"><span class="placeholder" data-i18n="options.account.loading">读取中…</span></div>
    </div>
    <div style="font-size:var(--text-xs); color:var(--muted); line-height:var(--leading-relaxed)" data-i18n="options.account.hint">
      在扩展 sidepanel 完成注册/登录后，这里会显示当前账号。Token 自动续期，无需手动操作。
    </div>
  </div>

  <script src="/lib/i18n/i18n.js"></script>
  <script src="/lib/i18n/dict/common.js"></script>
  <script src="/lib/i18n/dict/options.js"></script>
  <script src="/lib/i18n/switcher.js"></script>
  <script src="../sidepanel/shared/auth-api.js"></script>
  <script src="index.js"></script>
</body>
</html>
